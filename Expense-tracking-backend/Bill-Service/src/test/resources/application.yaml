server:
  port: 0

spring:
  application:
    name: BILL-SERVICE-TEST
  main:
    allow-bean-definition-overriding: true
  cloud:
    compatibility-verifier:
      enabled: false
    discovery:
      enabled: false
  datasource:
    url: jdbc:h2:mem:bill_service_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
      - org.springframework.cloud.netflix.eureka.EurekaClientAutoConfiguration
  mail:
    host: localhost
    port: 25

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

ocr:
  tesseract:
    data-path: /tmp/tessdata
    language: eng
    page-seg-mode: 3
    oem-mode: 3
  preprocessing:
    enabled: false
    target-dpi: 300
    max-width: 2000
    max-height: 2000
  upload:
    max-file-size: 10MB
    allowed-extensions: jpg,jpeg,png,gif,bmp,tiff
  confidence:
    high-threshold: 80.0
    medium-threshold: 50.0
